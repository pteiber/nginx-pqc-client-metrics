server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

# Without this, the querier can't find any metrics-generator instance
# registered in its ring when the Grafana trace view asks for TraceQL
# metrics (rate(), histogram_over_time()) on recent, not-yet-flushed data,
# and fails with "error finding generators in Querier.queryRangeRecent:
# empty ring". storage.remote_write pushes the generator's derived
# service-graph and span-metrics to Prometheus for longer-term queries
# (e.g. Grafana's Service Graph tab), separate from the recent-block path.
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics, local-blocks]
