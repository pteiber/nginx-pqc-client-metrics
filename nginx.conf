load_module modules/ngx_otel_module.so;

user  nginx;
worker_processes  auto;

error_log  /dev/stderr notice;
pid        /var/run/nginx.pid;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # --- TLS 1.3 session resumption -------------------------------------------
  # Resumption here is ticket/PSK-based (the TLS 1.2 session-ID cache does not
  # apply to a TLS-1.3-only server). Enabled explicitly rather than relying on
  # nginx defaults (tickets default on, cache default off) so the behaviour is
  # intentional and documented. This is the whole point of the demo: PQC full
  # handshakes are expensive, so operators care how often connections resume.
  #
  # shared (not builtin) cache: worker_processes is auto, so a per-worker cache
  # would miss whenever a resumption lands on a different worker than the
  # original handshake. 10m holds roughly 40000 sessions.
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_session_tickets on;
  # Explicit shared ticket key (generated into the image at build time). Without
  # it, each worker under worker_processes auto invents its own random ticket
  # key at startup, so a ticket issued by one worker fails to decrypt on another
  # and silently degrades to a full handshake. One shared key makes resumption
  # deterministic across workers.
  ssl_session_ticket_key /etc/nginx/ssl/ticket.key;

  # Structured JSON access log for Loki ingestion
  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"bytes_sent":$bytes_sent,'
      '"request_time":$request_time,'
      '"upstream_response_time":"$upstream_response_time",'
      '"ssl_protocol":"$ssl_protocol",'
      '"ssl_cipher":"$ssl_cipher",'
      '"ssl_curve":"$ssl_curve",'
      '"tls_session_reused":"$ssl_session_reused",'
      '"nginx_server":"$hostname",'
      '"http_user_agent":"$http_user_agent"'
    '}';

  access_log /dev/stdout json_combined;

  sendfile        on;
  keepalive_timeout  65;

  # OTEL tracing via ngx_otel_module
  otel_exporter {
    endpoint tempo:4317;
  }
  otel_service_name nginx-pqc-demo;
  otel_trace on;

  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    ssl_protocols TLSv1.3;

    # Prefer hybrid PQC group, fall back to classical
    ssl_conf_command Groups "X25519MLKEM768:X25519:P-256";

    # Enrich every OTEL span with all TLS negotiation details NGINX exposes.
    # ssl_curves (plural) is the client's full supported_groups offer, distinct
    # from ssl_curve (singular), the group actually negotiated; comparing the
    # two is what makes HRR and hybrid-vs-classical fallback visible in traces.
    otel_span_attr "tls.protocol" $ssl_protocol;
    otel_span_attr "tls.cipher" $ssl_cipher;
    otel_span_attr "tls.curve" $ssl_curve;
    otel_span_attr "tls.client_curves" $ssl_curves;
    otel_span_attr "tls.client_ciphers" $ssl_ciphers;
    otel_span_attr "tls.session_id" $ssl_session_id;
    otel_span_attr "tls.session_reused" $ssl_session_reused;
    otel_span_attr "tls.server_name" $ssl_server_name;
    otel_span_attr "tls.early_data" $ssl_early_data;
    # Which NGINX instance served this, so an APM/trace backend can break down
    # resumption by server the same way the Grafana dashboard does. $hostname
    # is the container name under podman.
    otel_span_attr "nginx.server" $hostname;

    # Expose TLS negotiation details as a JSON response
    location = /handshake-info {
      default_type application/json;
      return 200 '{"ssl_protocol":"$ssl_protocol","ssl_cipher":"$ssl_cipher","ssl_curve":"$ssl_curve"}';
    }
  }

  # Plain HTTP for manual /nginx_status inspection
  server {
    listen 8080;
    server_name _;

    location = /nginx_status {
      access_log off;
      stub_status;
    }
  }
}
